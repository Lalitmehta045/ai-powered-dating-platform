version: "3.8"

services:
  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: heartsync-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-heartsync_secret}
    networks:
      - heartsync-network

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: heartsync-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - heartsync-network

  # ── API Server ──────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: heartsync-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD:-heartsync_secret}@mongo:27017/heartsync?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    networks:
      - heartsync-network

  # ── Client (Nginx) ─────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: heartsync-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - heartsync-network

volumes:
  mongo_data:
  redis_data:

networks:
  heartsync-network:
    driver: bridge
