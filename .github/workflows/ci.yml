name: HeartSync CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client-ci:
    name: Frontend CI (Client)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        working-directory: client
        run: npm ci

      - name: Lint Frontend
        working-directory: client
        run: npm run lint

      - name: Build Frontend
        working-directory: client
        run: npm run build

  server-ci:
    name: Backend CI (Server)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        working-directory: server
        run: npm ci

      - name: Lint & Typecheck Backend
        working-directory: server
        run: npm run lint

      - name: Run Backend Tests
        working-directory: server
        run: npm run test

      - name: Build Backend
        working-directory: server
        run: npm run build

  docker-build-check:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [client-ci, server-ci]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend (API) Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: heartsync-api:latest

      - name: Build Frontend (Client) Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: heartsync-client:latest