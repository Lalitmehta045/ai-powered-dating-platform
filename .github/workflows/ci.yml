name: HeartSync CI/CD

on:
  push:
    branches: [main]    # 

jobs:    # job ka naam
  build:    
    runs-on: ubuntu-latest  #  GitHub Runner (Free)
    steps:
    - name: Checkout code 
      uses: actions/checkout@v4 # Clone the code into ubuntu-latest
 
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4 # Docker ko build karne ke liye setup